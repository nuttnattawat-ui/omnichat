# ===========================================
# Render Blueprint — Auto deploy from GitHub
# https://render.com/docs/blueprint-spec
# ===========================================

services:
  # --- Backend API ---
  - type: web
    name: omnichat-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: |
      npm install -g pnpm &&
      pnpm install &&
      cd apps/api &&
      pnpm exec prisma generate &&
      pnpm exec nest build
    startCommand: cd apps/api && pnpm exec prisma db push --skip-generate && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: omnichat-db
          property: connectionString
      - key: REDIS_URL
        sync: false  # Set manually — use Upstash free: https://upstash.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false

# --- Database ---
databases:
  - name: omnichat-db
    plan: free
    region: singapore
    databaseName: omnichat
    user: omnichat
