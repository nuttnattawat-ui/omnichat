# Cloudflare Pages configuration
# This file is for reference — actual setup is done via Cloudflare Dashboard
# or `npx wrangler pages project create omnichat-web`

name = "omnichat-web"
compatibility_date = "2024-12-01"
pages_build_output_dir = ".next/standalone"

# Build settings (configured in Cloudflare Dashboard):
#   Framework preset: Next.js
#   Root directory: apps/web
#   Build command: cd ../.. && npm install -g pnpm && pnpm install && pnpm build:web
#   Build output directory: apps/web/.next
#
# Environment variables to set:
#   NEXT_PUBLIC_API_URL = https://omnichat-api.onrender.com
