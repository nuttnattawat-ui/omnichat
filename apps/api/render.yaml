# Render Blueprint — deploy API as a Web Service
services:
  - type: web
    name: omnichat-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd ../.. && pnpm install && pnpm build:api
    startCommand: cd apps/api && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
